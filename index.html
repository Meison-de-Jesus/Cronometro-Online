<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width", initial-scale="1.0"/>
        <meta http-equiv="x-UA-Compatible" content="ie-edge"/>
        <title>Cronômetro Temporal</title>
        
        <style>
            body { /*Personalização do estilo*/
                background-color: black; /*Deixa o fundo da página escuro*/
                display: flex;
                align-items: center;
                margin: 40px;
                flex-direction: column;
            }

            .start {
                background-color: #ff4791;
                border: none;
                border-radius: 4px; 
                color: black;
                padding: 4px 12px;
                font-size: 16px;
            }

            .stop {
                background-color: #d8578b;
                color:black;
            }

            button:hover {
                background-color: #ff7db1;
                cursor: pointer;
            }

            h1 { /*EMOJI*/
                font-size: 64px;
                color: white;
            }
        </style>   
    </head>

    <body>

        <div>
            <input type="date" value="2022-05-14"/>
            <button class="start" onclick="start()">Clique Aqui</button>
            <button class="star stop" onclick="stop()">Resetar</button>
        </div>
        
        <h1>⏲️</h1>
        
        <script>

            const second = 1000;
            const minute = 60 * second;
            const hour = 60 * minute;
            const day = 24 * hour;
            let total;
            let finalDate;
            let interval_id;
            
            function start(){
                const date = document.querySelector("input").value;
                finalDate = new Date(date).getTime();  
                console.log(total);                
                interval_id = setInterval(timer, 1000);
               }
            function stop(){
                document.querySelector("h1").innerText = "⏲️";
                clearInterval(interval_id);
            }
            function timer(){
                let now = new Date().getTime();
                total = finalDate - now;
                const days = Math.floor(total/day) + 1;
                const hours = Math.floor((total%day)/hour) + 4;
                const minutes = Math.floor((total%hour)/minute);
                const seconds = Math.floor((total%minute)/second);
                document.querySelector(
                    "h1"
                ).innerHTML = `${-days} d ${-hours} h ${-minutes} m ${-seconds} s`;
            
            }
        </script>


    </body>
        
</html>
